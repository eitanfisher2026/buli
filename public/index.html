    window.__installPrompt = null;

      window.__installPrompt = e;
      window.dispatchEvent(new Event('pwa_install_ready'));
    });
    window.addEventListener('appinstalled', function() {
      window.__installPrompt = null;
      window.dispatchEvent(new Event('pwa_installed'));
    });

      _x.arcTo(180,0,180,_r,_r); _x.lineTo(180,180-_r);
      _x.arcTo(180,180,180-_r,180,_r); _x.lineTo(_r,180);
      _x.arcTo(0,180,0,180-_r,_r); _x.lineTo(0,_r);
      _x.arcTo(0,0,_r,0,_r); _x.closePath(); _x.fill();
